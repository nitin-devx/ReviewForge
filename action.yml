name: 'ReviewForge'
description: 'AI-powered pull request reviewer that acts like a senior engineer'
author: 'your-github-username'

inputs:
  github_token:
    description: 'GitHub token for reading diffs and posting comments'
    required: true
  openai_api_key:
    description: 'OpenAI API key for AI-powered review'
    required: true
  review_level:
    description: 'How strict the review should be: strict | standard | light'
    required: false
    default: 'standard'

runs:
  using: 'node20'
  main: 'src/index.js'